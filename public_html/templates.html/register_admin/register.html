<!-- templates.html/register_admin/register.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Administrador - Cyberhole Condominios CRM</title>
  <link rel="stylesheet" href="../../style_html/register.css">
  <script src="../../js/cyberhole-system.js"></script>
</head>
<body>
  <div class="form-card">
    <header>
      <h1>Registro de Administrador</h1>
      <p class="descripcion">Únete al CRM de Cyberhole Condominios para gestionar eficientemente tu comunidad.</p>
    </header>
    <main>
      <div id="notification" class="notification" style="display: none;"></div>
      <form id="adminRegisterForm" class="form-container">
        <div class="form-group">
          <label for="nombres">Nombres</label>
          <input type="text" id="nombres" name="nombres" required>
        </div>
        <div class="form-group">
          <label for="apellido1">Primer Apellido</label>
          <input type="text" id="apellido1" name="apellido1" required>
        </div>
        <div class="form-group">
          <label for="apellido2">Segundo Apellido (opcional)</label>
          <input type="text" id="apellido2" name="apellido2">
        </div>
        <div class="form-group">
          <label for="correo">Correo Electrónico</label>
          <input type="email" id="correo" name="correo" required>
        </div>
        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirmar Contraseña</label>
          <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn">Registrarme</button>
      </form>
    </main>
    <footer class="form-footer">
      <a href="login.html" class="btn">¿Ya tienes cuenta? Inicia sesión</a>
      <a href="../../index.html" class="btn">Volver al inicio</a>
    </footer>
  </div>


</body>
</html>
