<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Administrador - Cyberhole Condominios CRM</title>
  <link rel="stylesheet" href="../../style_html/register.css">
</head>
<body>
  <div class="form-card">
    <header>
      <h1>Registro de Administrador</h1>
      <p class="descripcion">Únete al CRM de Cyberhole Condominios para gestionar eficientemente tu comunidad.</p>
    </header>
    <main>
      <form action="../../php/admin/register.php" method="POST" class="form-container">
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirmar Contraseña</label>
          <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn">Registrarme</button>
      </form>
    </main>
    <footer class="form-footer">
      <a href="login.html" class="btn">¿Ya tienes cuenta? Inicia sesión</a>
      <a href="../../index.html" class="btn">Volver al inicio</a>
    </footer>
  </div>
</body>
</html>
