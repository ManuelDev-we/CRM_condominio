<!-- templates.html/register_resi/login.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión Residente - Cyberhole Condominios CRM</title>
  <link rel="stylesheet" href="../../style_html/login.css">
  <script src="../../js/cyberhole-system.js"></script>
</head>
<body>
  <div class="form-card">
    <header>
      <h1>Iniciar Sesión Residente</h1>
      <p class="descripcion">Accede a tu cuenta de residente para gestionar tus datos y solicitudes en el CRM.</p>
    </header>
    <main>
      <div id="notification" class="notification" style="display: none;"></div>
      <form id="residentLoginForm" class="form-container">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <br>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <br>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">Ingresar</button>
      </form>
    </main>
    <footer class="form-footer">
      <button type="button" onclick="window.location.href='register.html'" class="btn">¿Aún no tienes cuenta? Regístrate</button>
      <a href="../../index.html" class="btn">Volver al inicio</a>
    </footer>
  </div>

  <script>
    // El sistema de autenticación se maneja automáticamente con cyberhole-system.js
  </script>
</body>
</html>
