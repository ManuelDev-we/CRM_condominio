<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Residente - Cyberhole Condominios CRM</title>
  <link rel="stylesheet" href="../../style_html/register.css">
</head>
<body>
  <div class="form-card">
    <header>
      <h1>Registro de Residente</h1>
      <p class="descripcion">Únete a la comunidad de residentes de tu condominio para acceder a todas las funcionalidades del CRM.</p>
    </header>
    <main>
      <form action="../../php/resi/register.php" method="POST" class="form-container">
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <br>
          <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
          <label for="codigo">Código de Residencia</label>
          <br>
          <input type="text" id="codigo" name="codigo" required>
        </div>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <br>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <br>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">Registrarme</button>
      </form>
    </main>
    <footer class="form-footer">
      <a href="login.html" class="btn">¿Ya tienes cuenta? Inicia sesión</a>
      <a href="../../index.html" class="btn">Volver al inicio</a>
    </footer>
  </div>
</body>
</html>
